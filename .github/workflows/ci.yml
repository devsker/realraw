name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: ubuntu-latest
            label: Linux
          - os: windows-latest
            label: Windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-bundle
        if: runner.os == 'macOS'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-bundle

      - name: Install create-dmg
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Install cargo-deb
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb

      - name: Cache Windows packaging tools
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: tools
          key: win-packaging-nsis-3.10-wix-3.14.1

      - name: Install NSIS and WiX (portable)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tools = Join-Path $env:GITHUB_WORKSPACE "tools"
          New-Item -ItemType Directory -Force -Path $tools | Out-Null

          $nsisDir = Join-Path $tools "nsis-3.10"
          if (-not (Test-Path (Join-Path $nsisDir "makensis.exe"))) {
            $nsisZip = Join-Path $tools "nsis-3.10.zip"
            Write-Host "Downloading NSIS 3.10..."
            Invoke-WebRequest -Uri "https://downloads.sourceforge.net/project/nsis/NSIS%203/3.10/nsis-3.10.zip" -OutFile $nsisZip -UserAgent "Wget/1.21"
            Expand-Archive -Path $nsisZip -DestinationPath $tools -Force
            Remove-Item $nsisZip -Force -ErrorAction SilentlyContinue
          }

          $wixDir = Join-Path $tools "wix"
          if (-not (Test-Path (Join-Path $wixDir "candle.exe"))) {
            $wixZip = Join-Path $tools "wix314-binaries.zip"
            Write-Host "Downloading WiX 3.14 binaries..."
            Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip" -OutFile $wixZip
            New-Item -ItemType Directory -Force -Path $wixDir | Out-Null
            Expand-Archive -Path $wixZip -DestinationPath $wixDir -Force
            Remove-Item $wixZip -Force -ErrorAction SilentlyContinue
          }

          Add-Content -Path $env:GITHUB_PATH -Value $nsisDir
          Add-Content -Path $env:GITHUB_PATH -Value $wixDir

      # Single release compile: builds lib, bins, and tests.
      - name: Test (release)
        run: cargo test --release

      - name: Package
        shell: bash
        run: ./scripts/package.sh all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: realraw-${{ matrix.label }}
          path: |
            target/release/realraw
            target/release/realraw.exe
            target/release/*-setup.exe
            target/release/*.msi
            target/release/*.dmg
            target/debian/*.deb
            target/release/*.AppImage
            target/release/bundle/**/*.app
          compression-level: 0
          retention-days: 7
          if-no-files-found: ignore
